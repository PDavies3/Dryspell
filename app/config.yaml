# Directory Paths (Relative to the project execution environment)
data_path: "data/raw"      # Raw IMERG NetCDF files directory
output_dir: "data/plots"   # Output directory for processed weekly PNGs
log_dir: "logs"            # Log directory for diagnostic tracking
# ── Pipeline Run Parameters ──
start_date: "2026-03-01"
threshold: 1.0           # mm/day (less than this is dry)
week_start: "Mon"        # 'Mon' or 'Sun'
dpi: 150

# ── Spatial Crop (Ghana/West Africa Default) ──
bbox: [-5.0, 3.0, 4.0, 12.0]  # [lon_min, lon_max, lat_min, lat_max]

# ── Earthdata Shortname ──
short_name: "GPM_3IMERGDL" # GPM IMERG Late/Final Run Daily
version: "07"
