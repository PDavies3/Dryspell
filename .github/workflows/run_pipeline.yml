name: Scheduled IMERG Pipeline

on:
  schedule:
    # Runs automatically every day at 03:00 UTC
    - cron: '0 3 * * *'
  # Allows you to click a button and trigger the pipeline manually anytime
  workflow_dispatch:

env:
  # Resolves the Node.js 20 deprecation warning by forcing Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # 1. Pull down your repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Python Environment (Cache input completely removed!)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Install spatial libraries required by Cartopy & Matplotlib
    - name: Install Spatial System Libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y libgdal-dev libproj-dev proj-data proj-bin libgeos-dev

    # 4. Install all Python packages directly
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas xarray netCDF4 matplotlib cartopy earthaccess pyyaml dask
    # 5. Build the .netrc authorization file on-the-fly using Repository Secrets
    - name: Write NASA Credentials
      run: |
        echo "machine urs.earthdata.nasa.gov login ${{ secrets.EARTHDATA_USERNAME }} password ${{ secrets.EARTHDATA_PASSWORD }}" > ~/.netrc
        chmod 600 ~/.netrc

    # 6. Create local directories so scripts don't fail looking for paths
    - name: Pre-create paths
      run: |
        mkdir -p data/raw
        mkdir -p data/plots

    # 7. Run download and processing scripts
    - name: Execute Pipeline
      run: |
        python app/downloader.py
        python app/processor.py

    # 8. Check if there are new PNGs, commit them, and push them back to GitHub
    - name: Save Plots to Repo
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/plots/
        git diff-index --quiet HEAD || git commit -m "Auto-update dry spell plots"
        git push
